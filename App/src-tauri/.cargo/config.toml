# =============================================================================
# Cargo 配置 - 同时支持 MSVC 和 GNU (MinGW) 工具链
# =============================================================================
#
# [注意] 如果项目路径包含非 ASCII 字符（如中文）：
# - MSVC 工具链：通常可以正常工作
# - GNU 工具链：可能需要取消下面的 target-dir 注释，将构建目录移到纯 ASCII 路径
#
# [build]
# target-dir = "C:/build/ecoalert"
# =============================================================================

# MinGW/GNU 工具链特定配置
# 链接器在导出大量符号时可能超过 16-bit ordinal 上限（65535）。
# --exclude-libs=ALL 隐藏静态库里的所有符号，仅保留当前 crate 自己需要的，
# 从而大幅缩减 cdylib 的导出表大小。
[target.x86_64-pc-windows-gnu]
rustflags = ["-C", "link-arg=-Wl,--exclude-libs=ALL"]
