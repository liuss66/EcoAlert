# YOLO Person Detection Server Configuration

server:
  # 默认仅允许本机访问。若改为 0.0.0.0，请同时设置 auth_token，并在
  # 客户端地址后附加 ?token=xxx。
  host: "127.0.0.1"
  port: 8090
  max_frame_bytes: 5242880
  queue_timeout_sec: 2.0
  auth_token: ""

model:
  name: "model/yolo11x.pt"  # yolo11n.pt, yolo11s.pt, yolo11m.pt, yolo11l.pt, yolo11x.pt
  confidence: 0.45
  iou_threshold: 0.35
  classes: [0]  # COCO class 0 = person
  device: "auto"  # auto, cpu, cuda:0
  imgsz: 640
