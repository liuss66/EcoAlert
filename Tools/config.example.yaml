# 推流器配置示例
# 用法：python -m push_streamer.cli --config config.example.yaml

server:
  http_port: 8080        # HLS HTTP 服务端口
  rtmp_port: 1935        # RTMP 推流端口（App 端 stream::rtmp 监听这里）

defaults:
  loop: true             # 默认循环播放
  segment_time: 2        # HLS 切片时长（秒）
  overlay: true          # 是否叠加时间戳 / 通道名

cameras:
  - name: cam1
    source: ../Video/sample_01_meeting.mp4
    protocol: hls
    location: "会议室 1"
    bitrate: 1500         # 模拟码率（kbps）
  - name: cam2
    source: ../Video/sample_02_meeting.mp4
    protocol: hls
    location: "会议室 2"
    bitrate: 2000
  - name: cam3
    source: ../Video/sample_03_motion.mp4
    protocol: rtmp
    location: "测试通道"
    bitrate: 1000
