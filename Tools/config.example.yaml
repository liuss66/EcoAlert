# EcoAlert 推流器配置
# 用法：python -m push_streamer.cli --config config.example.yaml
#
# HLS 端点命名规则：cam-1, cam-2, ...
# App 端视频源地址：http://127.0.0.1:{http_port}/{name}/index.m3u8

server:
  http_port: 8080        # HLS HTTP 服务端口

defaults:
  loop: true             # 默认循环播放
  segment_time: 2        # HLS 切片时长（秒）

# ──────────────────────────────────────────────────────────
# 摄像头列表
# name    = HLS 端点名（与 App 端 URL 对应）
# source  = 视频文件路径（相对于本配置文件目录）
# location = 测试视频分组 / 文件描述
# bitrate = 推流码率（kbps）
# ──────────────────────────────────────────────────────────
cameras:
  # —— 域控测试视频 ——
  - name: cam-1
    source: ../Video/4·24域控.mp4
    location: "域控测试视频 / 4·24域控"
    bitrate: 1500

  - name: cam-5
    source: ../Video/5·27域控.mp4
    location: "域控测试视频 / 5·27域控"
    bitrate: 2000

  - name: cam-6
    source: ../Video/5·28域控.mp4
    location: "域控测试视频 / 5·28域控"
    bitrate: 1500

  - name: cam-7
    source: ../Video/5·7域控.mp4
    location: "域控测试视频 / 5·7域控"
    bitrate: 1000

  # —— 底盘测试视频 ——
  - name: cam-2
    source: ../Video/4·24底盘.mp4
    location: "底盘测试视频 / 4·24底盘"
    bitrate: 1500

  - name: cam-4
    source: ../Video/5·15底盘.mp4
    location: "底盘测试视频 / 5·15底盘"
    bitrate: 1500

  - name: cam-8
    source: ../Video/5·7底盘.mp4
    location: "底盘测试视频 / 5·7底盘"
    bitrate: 2000

  # —— 硬件测试视频 ——
  - name: cam-3
    source: ../Video/5·14硬件.mp4
    location: "硬件测试视频 / 5·14硬件"
    bitrate: 1500
