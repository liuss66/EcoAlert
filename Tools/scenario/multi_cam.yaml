# 多路并发场景
# 同时推 8 路视频，验证 App 并发播放 / 状态聚合 / 告警去重
# 用法：python -m push_streamer.cli --config scenario/multi_cam.yaml

server:
  http_port: 8080

defaults:
  loop: true
  segment_time: 2

cameras:
  # —— A 栋办公 ——
  - { name: cam-1, source: ../Video/4·24域控.mp4, location: "A栋 · 大堂入口",   bitrate: 1500 }
  - { name: cam-2, source: ../Video/4·24底盘.mp4, location: "A栋 · 前台接待区", bitrate: 1500 }
  - { name: cam-3, source: ../Video/5·14硬件.mp4, location: "A栋 · 电梯厅",     bitrate: 1500 }
  - { name: cam-4, source: ../Video/5·15底盘.mp4, location: "A栋 · 茶水间",     bitrate: 1500 }
  # —— B 栋车间 ——
  - { name: cam-5, source: ../Video/5·27域控.mp4, location: "B栋 · 生产线 1",   bitrate: 2000 }
  - { name: cam-6, source: ../Video/5·28域控.mp4, location: "B栋 · 原材料仓库", bitrate: 1500 }
  # —— 园区周界 ——
  - { name: cam-7, source: ../Video/5·7域控.mp4,  location: "园区 · 东门",      bitrate: 1000 }
  # —— 核心机房 ——
  - { name: cam-8, source: ../Video/5·7底盘.mp4,  location: "核心机房",          bitrate: 2000 }
