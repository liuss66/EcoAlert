# 多路并发场景
# 同时推 8 路视频，验证 App 并发播放 / 状态聚合 / 告警去重
# 用法：python -m push_streamer.cli --config scenario/multi_cam.yaml

server:
  http_port: 8080

defaults:
  loop: true
  segment_time: 2

cameras:
  # —— 域控测试视频 ——
  - { name: cam-1, source: ../Video/4·24域控.mp4, location: "域控测试视频 / 4·24域控", bitrate: 1500 }
  - { name: cam-5, source: ../Video/5·27域控.mp4, location: "域控测试视频 / 5·27域控", bitrate: 2000 }
  - { name: cam-6, source: ../Video/5·28域控.mp4, location: "域控测试视频 / 5·28域控", bitrate: 1500 }
  - { name: cam-7, source: ../Video/5·7域控.mp4,  location: "域控测试视频 / 5·7域控",  bitrate: 1000 }
  # —— 底盘测试视频 ——
  - { name: cam-2, source: ../Video/4·24底盘.mp4, location: "底盘测试视频 / 4·24底盘", bitrate: 1500 }
  - { name: cam-4, source: ../Video/5·15底盘.mp4, location: "底盘测试视频 / 5·15底盘", bitrate: 1500 }
  - { name: cam-8, source: ../Video/5·7底盘.mp4,  location: "底盘测试视频 / 5·7底盘",  bitrate: 2000 }
  # —— 硬件测试视频 ——
  - { name: cam-3, source: ../Video/5·14硬件.mp4, location: "硬件测试视频 / 5·14硬件", bitrate: 1500 }
